# docker-compose.prod.yml — PRODUCTION (referensi untuk deploy, misal ke SnapDeploy)
#
# Tidak ada service "db" di sini karena database production pakai Aiven MySQL (cloud),
# bukan container. Backend connect ke Aiven lewat env var di bawah / file .env production.
#
# Jalankan dengan:
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  backend:
    build:
      context: ./backend
    container_name: it_asset_backend
    image: it-asset-backend:${APP_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSL: "true"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}

  frontend:
    build:
      context: ./frontend
    container_name: it_asset_frontend
    image: it-asset-frontend:${APP_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
