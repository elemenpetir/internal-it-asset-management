server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Penting untuk React Router: kalau path tidak ketemu sebagai file fisik,
    # fallback ke index.html supaya client-side routing yang handle.
    # Tanpa ini, refresh di /assets/5 akan 404 karena Nginx cari file itu secara literal.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
